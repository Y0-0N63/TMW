<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기</title>
  <style>
    /* CSS 코드 삽입 */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  
    .forgot-password-container {
      width: 100%;
      max-width: 500px;
      background-color: #fff;
      border-radius: 10px;
      padding: 50px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
    }
  
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
  
    .forgot-password-form h2 {
      font-size: 28px;
      margin-bottom: 30px;
      text-align: center;
    }
  
    .input-group {
      margin-bottom: 30px;
    }
  
    .input-group label {
      display: block;
      font-size: 16px;
      margin-bottom: 10px;
    }
  
    .input-group input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }
  
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 5px;
      background-color: #336edb;
      color: #fff;
      font-size: 18px;
      margin-top: 10px;
      cursor: pointer;
    }
  
    button[type="submit"]:hover {
      background-color: #285bb5;
    }
  
    @media screen and (max-width: 600px) {
      .forgot-password-container {
        padding: 30px;
      }
  
      .forgot-password-form h2 {
        font-size: 24px;
      }
  
      .input-group label,
      .input-group input,
      button[type="submit"] {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="forgot-password-container">
    <div class="logo">
      <img src="./logo_rmv (1).png" alt="Logo" width="100"> <!-- 로고 이미지 -->
    </div>
    <form id="forgotPasswordForm" class="forgot-password-form">
      <h2>비밀번호 찾기</h2>
      <div class="input-group">
        <label for="name">이름</label>
        <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
      </div>
      <div class="input-group">
        <label for="phonenumber">전화번호</label>
        <input type="text" id="phonenumber" name="phonenumber" placeholder="전화번호를 입력하세요" required>
      </div>
      <button type="submit">임시 비밀번호 전송</button>
    </form>
  </div>

  <script>
    // JavaScript 코드 삽입
    document.addEventListener('DOMContentLoaded', function() {
      // 폼과 입력 필드를 선택합니다.
      const form = document.getElementById('forgotPasswordForm');
      const nameInput = document.getElementById('name');
      const phoneInput = document.getElementById('phonenumber');
  
      // 폼 제출 이벤트 핸들러
      form.addEventListener('submit', function(event) {
        event.preventDefault(); // 폼이 제출되는 기본 동작을 막습니다.
  
        // 입력된 데이터 수집
        const formData = {
          name: nameInput.value,
          phonenumber: phoneInput.value,
        };
  
        console.log('Form submitted:', formData); // 제출된 데이터를 콘솔에 출력
  
        // 데이터가 유효한지 확인 후 알림 창을 띄웁니다.
        if (formData.name && formData.phonenumber) {
          alert('임시 비밀번호가 전송되었습니다.');
        } else {
          alert('모든 필드를 입력해주세요.');
        }
      });
    });
  </script>
</body>
</html>
