<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./resume.css" />
  </head>
  <body>
    <!-- 상단바 -->
    <div class="TopBar">
      <img id="logo" src="../img/logo.png" alt="내일 로고" />
      <h1>이력서페이지</h1>
      <!-- 검색 -->
      <header id="header">
        <input type="text" id="search" placeholder="검색어를 입력하세요" />
        <button id="searchBtn">🔍</button>
      </header>
      <!-- 로그인 정보 -->
      <div id="LoginInfo"><span id="TopUserName"></span>님</div>
    </div>

    <!-- 카테고리바 -->
    <div id="category">
      <div class="menu">
        <a href="">일자리이음</a>
        <div class="submenu">
          <a href="../JobSearchPage/일자리이음.html">일자리 찾기&신청하기</a>
        </div>
      </div>
      <div class="menu">
        <a href="#">지식이음</a>
        <div class="submenu">
          <a href="센터 찾기 페이지로 이동">센터 찾기&프로그램 신청하기</a>
        </div>
      </div>
      <div class="menu">
        <a href="#">고객센터</a>
        <div class="submenu">
          <a href="#자주묻는 질문 페이지로 이동">자주묻는 질문</a>
          <a href="#문의/제안/신고">문의/제안/신고</a>
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
          <a href="#">위치기반서비스이용약관</a>
        </div>
      </div>
    </div>

    <div id="container">
        <p class="title">기본정보 *</p>
    <div id="resume-container">
        <div class="profile">
            <div class="profile-info">
                <label for="">이름*</label>
                <input type="text" id="resume-name">
                <label for="">성별*</label>
                <input type="radio" name="gender" value="male"> 남성
                <input type="radio" name="gender" value="female"> 여성 <br>
                <label for="">연령*</label>
                <input type="text" id="resume-age"><br>
                <label for="">주소*</label>
                <input type="text" id="resume-address"><br>
                <label for="">휴대폰*</label>
                <input type="text" id="resume-phoneNum">
            </div>
        </div>
    </div>

        <p class="title">자기소개</p>
    <div id="resume-container">
        <div class="section">
            <div class="textarea-container">
                <textarea id="resume-intro" placeholder="나에 대해 자유롭게 설명해보세요."></textarea>
            </div>
            <a href="https://search.naver.com/search.naver?sm=whl_nht&query=%EB%84%A4%EC%9D%B4%EB%B2%84+%EB%A7%9E%EC%B6%A4%EB%B2%95+%EA%B2%80%EC%82%AC%EA%B8%B0">
                <button class="match-button">맞춤법 검사하기</button>
            </a>
        </div>
    </div>
      <p>*과거병력사항, 경력사항, 자격증 등의 항목은 회원정보에서 수정 가능합니다.</p>
    </div>


    <!-- fixed -->
    <div class="fixed-section">
        <button id="saveForm" onclick="saveForm()">이력서 저장</button>
        <button id="modifyForm" onclick="modifyForm()">이력서 수정</button>
        <button style="background-color: #ccc; color: #666" id="deleteForm">이력서 삭제</button>

        <div class="required-fields">
            <h3>필수 입력 사항 *</h3>
            <ul>
                <li>개인기본정보</li>
            </ul>
        </div>

        <div class="optional-fields">
            <h3>선택 입력 사항</h3>
            <ul>
                <li>자기소개</li>
            </ul>
        </div>
        <!-- 푸터 -->
      <div id="footer">
        <a class="footer_a" href="">자주 묻는 질문 |</a>
        <a class="footer_a" href="">문의/제안/신고 |</a>
        <a class="footer_a" href="">이용약관 |</a>
        <a class="footer_a" href="">개인정보처리방침 |</a>
        <a class="footer_a" href="">위치기반서비스이용약관</a>
        <br />
      </div>
    </div>
    
    <script src="./resume.js"></script>
  </body>
</html>
