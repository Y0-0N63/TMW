<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자주 묻는 질문(FAQ)</title>
    <link rel="stylesheet" href="./faq.css">
    <style>
        /* 챗봇 기본적으로 숨기기 */
        df-messenger {
            display: none;
        }
    </style>
</head>
<body>
    <!-- ⭐헤더 -->
    <header id="header">
        <img id="logo" src="./logo_rmv (1).png" width="100px" height="100px" alt="로고">
        <input type="text" id="search" placeholder="검색어를 입력하세요">
        <button id="searchBtn">🔍</button>
    </header>
    <hr>

    <!-- ⭐카테고리 -->
    <nav id="category">
        <div class="menu"><a href="#">일자리이음</a></div>
        <div class="menu"><a href="#">지식이음</a></div>
        <div class="menu"><a href="#">마음이음</a></div>
        <div class="menu"><a href="#">고객센터</a></div>
    </nav>
    <hr>

    <!-- ⭐FAQ 컨테이너 -->
    <main class="container">
        <h1>자주 묻는 질문 (FAQ)</h1>
        <section class="faq-section">
            <h2>Q1: 노인 일자리를 어떻게 신청할 수 있나요?</h2>
            <p>A: 노인 일자리 신청은 온라인 사이트나 가까운 노인복지센터를 통해 가능합니다.</p>
        </section>
        <section class="faq-section">
            <h2>Q2: 일자리 조건은 어떻게 되나요?</h2>
            <p>A: 일자리 조건은 연령, 건강 상태, 경력 등에 따라 다르며, 자세한 사항은 각 일자리 공고에서 확인할 수 있습니다.</p>
        </section>

        <!-- 챗봇 버튼 -->
        <div class="chatbot-container">
            <button class="chatbot-button" onclick="openChatbot()">채팅으로 질문하기</button>
        </div>
    </main>

    <!-- ⭐푸터 -->
    <footer id="footer">
        <a class="footer_a" href="#">이용약관</a> |
        <a class="footer_a" href="#">개인정보처리방침</a> |
        <a class="footer_a" href="#">제휴 및 광고문의</a> |
        <a class="footer_a" href="#">자주 묻는 질문(개인용)</a> |
        <a class="footer_a" href="#">자주 묻는 질문(기업용)</a> |
        <a class="footer_a" href="#">1:1 문의</a>
    </footer>

    <!-- Dialogflow 챗봇인데 구글 클라우드 계정 생성해야 됨 -->
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
    <df-messenger 
        language-code="ko">
    </df-messenger>

    <script>
        // '채팅으로 질문하기' 버튼이 클릭될 때 호출
        function openChatbot() {
            const chatbot = document.querySelector('df-messenger'); // 페이지에서 df-messenger 요소를 선택
            if (chatbot.style.display === 'none') {
                chatbot.style.display = 'block'; // df-messenger 요소를 화면에 표시
            } else {
                chatbot.style.display = 'none'; // 이미 표시되어 있으면 숨기기
            }
        }
    </script>
</body>
</html>
