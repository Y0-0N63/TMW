<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색</title>
    <style>
        body {
            background-color: whitesmoke;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .TopBar {
            width: 100%;
            height: 100px; 
            background-color: white;
            display: flex;
            align-items: center;
            padding-left: 2%;
        }
        #menu {
            width: 50px;
            height: 50%;
            border: 1px solid grey;
            border-radius: 10%;
            padding: 10px;
            cursor: pointer;
        }
        #menu:hover {
            background-color: gainsboro;
        }
        #logo {
            height: 90%;
            padding-left: 2%;
            padding-right: 2%;
        }
        .main {
            width: 60%;
            margin-top: 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #LoginInfo {
            font-size: x-large;
            font-weight: bold;
            color: gray;
            margin-left: auto;
            margin-right: 10%;
        }
        .search_container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }
        .container {
            border: 2.5px solid black;
            box-sizing: border-box;
            background-color: white;
            padding: 5%;
            margin-bottom: 100px;
            width: 100%;
        }
        button {
            padding: 10px 20px;
            background-color: rgb(199, 230, 255);
            color: black;
            border: 1.5px solid black;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: whitesmoke;
        }
        input[type="text"] {
            padding: 10px;
            margin-right: 10px;
            font-size: large;
            border: 1.5px solid black;
            border-radius: 5px;
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="TopBar">
        <img id="menu" src="./img/menu.png" alt="메뉴 아이콘">
        <img id="logo" src="./img/logo_rmv.png" alt="내일 로고">
        <h1>검색</h1>
        <div id="LoginInfo"><span id="UserName"></span>님</div>
    </div>
    
    <div class="main">
        <h1>검색어를 입력하세요</h1>    
        <div class="search_container">
            <input type="text" id="text_find" placeholder="검색어 입력" />
            <button id="findtextBtn">검색</button>
        </div>

        <div class="container">
            <!-- 검색 결과 -->
        </div>
    </div>
</body>
</html>
