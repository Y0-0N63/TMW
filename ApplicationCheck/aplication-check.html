<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="application-check.css" />
  </head>
  <body>
    <!-- 상단바 -->
    <div class="TopBar">
      <img id="logo" src="../img/logo.png" alt="내일 로고" />
      <h1>신청 일자리&프로그램 조회</h1>
      <!-- 검색 -->
      <header id="header">
        <input type="text" id="search" placeholder="검색어를 입력하세요" />
        <button id="searchBtn">🔍</button>
      </header>
      <!-- 로그인 정보 -->
      <div id="LoginInfo"><span id="TopUserName"></span>님</div>
    </div>

    <!-- 카테고리바 -->
    <div id="category">
      <div class="menu">
        <a href="">일자리이음</a>
        <div class="submenu">
          <a href="../JobSearchPage/일자리이음.html">일자리 찾기&신청하기</a>
        </div>
      </div>
      <div class="menu">
        <a href="#">지식이음</a>
        <div class="submenu">
          <a href="센터 찾기 페이지로 이동">센터 찾기&프로그램 신청하기</a>
        </div>
      </div>
      <div class="menu">
        <a href="#">고객센터</a>
        <div class="submenu">
          <a href="#자주묻는 질문 페이지로 이동">자주묻는 질문</a>
          <a href="#문의/제안/신고">문의/제안/신고</a>
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
          <a href="#">위치기반서비스이용약관</a>
        </div>
      </div>
    </div>
    
    <!-- 메인 -->
    <div id="container">
      <div class="category">
        <p>신청한 근로 프로그램 조회</p>
      </div>
      <div id="appliedJobContainer">
        <div class="form-group period">
          <label for="">기간 지정</label>
          <input type="date" class="input-Job" id="start-date" />
          ~
          <input type="date" class="input-Job" id="end-date" />
        </div>
        <div class="form-group">
          <label for="program-name">프로그램명</label>
          <input type="text" class="input-Job" id="program-name" />
        </div>
        <div>
          <table border="1px solid black">
            <thead>
              <th>프로그램명</th>
              <th>위치</th>
              <th>시작날짜</th>
              <th>종료날짜</th>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="buttons">
          <button type="button" onclick="searchAppliedJob()">검색</button>
          <button type="button" onclick="clearAppliedJobTable()">초기화</button>
        </div>
        <div class="alert" id="alert-job"></div>
      </div>

      <hr>

      <div class="category">
        <p>신청한 교육 프로그램(센터) 조회</p>
      </div>
      <div id="appliedProContainer">
        <div class="form-group">
          <label for="program-name-2">프로그램(센터)명</label>
          <input type="text" class="input-Pro" id="program-name-2" />
        </div>

        <div>
          <table border="1px solid black">
            <thead>
              <th>프로그램(센터)명</th>
              <th>위치</th>
              <th>전화</th>
              <th>팩스</th>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="buttons">
          <button type="button" onclick="searchAppliedProgram()">검색</button>
          <button type="button" onclick="clearAppliedProgramTable()">
            초기화
          </button>
        </div>
        <div class="alert" id="alert-pro"></div>
      </div>
      <!-- 푸터 -->
      <div id="footer">
        <a class="footer_a" href="">자주 묻는 질문 |</a>
        <a class="footer_a" href="">문의/제안/신고 |</a>
        <a class="footer_a" href="">이용약관 |</a>
        <a class="footer_a" href="">개인정보처리방침 |</a>
        <a class="footer_a" href="">위치기반서비스이용약관 </a>
        <br />
      </div>
    </div>

    <script src="/ApplicationCheckPage/application-check.js"></script>
  </body>
</html>
