<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마이페이지 회원정보</title>
    <link rel="stylesheet" href="./JobSearchPage.css" />
  </head>

  <body>
    <!-- 상단바 -->
    <div class="TopBar">
      <img id="logo" src="../img/logo.png" alt="내일 로고" />
      <h1>일자리 찾기</h1>
      <!-- 검색 -->
      <header id="header">
        <input type="text" id="search" placeholder="검색어를 입력하세요" />
        <button id="searchBtn">🔍</button>
      </header>
      <!-- 로그인 정보 -->
      <div id="LoginInfo"><span id="TopUserName"></span>님</div>
    </div>

    <!-- 카테고리바 -->
    <div id="category">
      <div class="menu">
        <a href="">일자리이음</a>
        <div class="submenu">
          <a href="../JobSearchPage/일자리이음.html">일자리 찾기&신청하기</a>
        </div>
      </div>
      <div class="menu">
        <a href="#">지식이음</a>
        <div class="submenu">
          <a href="센터 찾기 페이지로 이동">센터 찾기&프로그램 신청하기</a>
        </div>
      </div>
      <div class="menu">
        <a href="#">고객센터</a>
        <div class="submenu">
          <a href="#자주묻는 질문 페이지로 이동">자주묻는 질문</a>
          <a href="#문의/제안/신고">문의/제안/신고</a>
          <a href="#">이용약관</a>
          <a href="#">개인정보처리방침</a>
          <a href="#">위치기반서비스이용약관</a>
        </div>
      </div>
    </div>

    <div id="container">
      <div class="container">
        <div id="mapDiv">
          <input
            id="presentAddress"
            type="text"
            placeholder="현위치를 작성해주세요.(도로명주소)"
          />
          <button id="presentAddressBtn">완료</button>
          <input
            id="mapSearch"
            type="text"
            placeholder="찾을 지역을 입력해주세요."
          />
          <button id="mapSearchBtn" onclick="searchPlaces()">검색</button>

          <div id="map" style="width: 400px; height: 350px"></div>
        </div>
        <div id="wpListContainer">
          <div id="wpListFilter">
            <p id="sorting">정렬</p>
            <select id="howToShowFilter">
              <option value="none">필터선택</option>
              <option value="closeFilter">가까운 순</option>
              <!-- <option value="recentFilter">최신순</option> -->
            </select>
            <br />
            <p id="wpListFilterDescription">
              아래 리스트에서 파란 상호명을 누르면 상세설명이 나옵니다!
            </p>
          </div>
          <div class="wpItemContainer">
            <div class="wpList">
              <p class="wpName"></p>
              <p class="wpDistance"></p>
              <p class="wpAddress"></p>
              <br />
            </div>
          </div>
        </div>
      </div>
      <!-- 푸터 -->
      <div id="footer">
        <a class="footer_a" href="">자주 묻는 질문 |</a>
        <a class="footer_a" href="">문의/제안/신고 |</a>
        <a class="footer_a" href="">이용약관 |</a>
        <a class="footer_a" href="">개인정보처리방침 |</a>
        <a class="footer_a" href="">위치기반서비스이용약관 </a>
        <br />
      </div>
    </div>

    <script
      type="text/javascript"
      src="//dapi.kakao.com/v2/maps/sdk.js?appkey=896bcba1c0b0dbe395b398da0dead7a6&libraries=services"
    ></script>
    <script src="./JobSearchPage.js"></script>
  </body>
</html>
