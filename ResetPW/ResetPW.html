            <button id="searchBtn">🔍</button>
        </header>
        <!-- 로그인 정보 -->
        <div id="LoginInfo"><span id="TopUserName"></span>님</div>
    </div>
    
<!-- 카테고리바 -->
<div id="category">
    <div class="menu">
    <a href="">일자리이음</a>
    <div class="submenu">
        <a href="../JobSearchPage/일자리이음.html">일자리 찾기&신청하기</a>

    </div>
    <div class="menu">
    <a href="#">지식이음</a>

        <a href="센터 찾기 페이지로 이동">센터 찾기&프로그램 신청하기</a>
    </div>

<!-- 비밀번호 재설정 -->
    <div class="main">
        <h1>비밀번호 재설정</h1>    
        <div class="container">
            <div class="form-group">
                <label for="current-password">현재 비밀번호</label>
                <input type="password" id="current-password" required>
            </div>
            <div class="form-group">
                <label for="new-password">새 비밀번호</label>
                <input type="password" id="new-password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">새 비밀번호 확인</label>
                <input type="password" id="confirm-password" required>
            </div>
            <button id="reset-button">비밀번호 재설정</button>
        </div>
    </div>

<!-- 푸터 -->
