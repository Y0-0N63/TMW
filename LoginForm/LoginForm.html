<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 찾기</title>
  <style>
    /* CSS 코드 삽입 */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .forgot-password-container {
      width: 100%;
      max-width: 500px;
      background-color: #fff;
      border-radius: 10px;
      padding: 50px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      box-sizing: border-box;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .forgot-password-form h2 {
      font-size: 28px;
      margin-bottom: 30px;
      text-align: center;
    }

    .input-group {
      margin-bottom: 30px;
    }

    .input-group label {
      display: block;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .input-group input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    button[type="submit"] {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 5px;
      background-color: #336edb;
      color: #fff;
      font-size: 18px;
      margin-top: 10px;
      cursor: pointer;
    }

    button[type="submit"]:hover {
      background-color: #285bb5;
    }

    @media screen and (max-width: 600px) {
      .forgot-password-container {
        padding: 30px;
      }

      .forgot-password-form h2 {
        font-size: 24px;
      }

      .input-group label,
      .input-group input,
      button[type="submit"] {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="forgot-password-container">
    <div class="logo">
      <img src="logo_rmv (1).png" alt="Logo" width="100"> <!-- 로고 이미지 -->
    </div>
    <form id="loginForm" class="forgot-password-form">
      <h2>로그인</h2>
      <div class="input-group">
        <label for="phonenumber">전화번호</label>
        <input type="text" id="phonenumber" name="phonenumber" placeholder="전화번호를 입력하세요" required>
      </div>
      <div class="input-group">
        <label for="userpwd">비밀번호</label>
        <input type="password" id="userpwd" name="userpwd" placeholder="비밀번호를 입력하세요" required>
      </div>
      <button type="submit">로그인</button>
    </form>
  </div>

  <script>
    // JavaScript 코드 삽입
    document.addEventListener('DOMContentLoaded', function() {
      let phoneNumber = '';
      let userPwd = '';

      // 전화번호 입력 처리
      const setPhoneNumber = (value) => {
        phoneNumber = value;
      };

      // 비밀번호 입력 처리
      const setUserPwd = (value) => {
        userPwd = value;
      };

      // 로그인 처리 함수
      const handleLogin = (event) => {
        event.preventDefault();

        console.log('전화번호:', phoneNumber);
        console.log('비밀번호:', userPwd);

        if (phoneNumber && userPwd) {
          alert('로그인 성공');
        } else {
          alert('로그인 정보를 확인하세요.');
        }
      };

      // 폼 제출 시 처리
      const loginForm = document.getElementById('loginForm');
      loginForm.addEventListener('submit', handleLogin);

      // 입력 필드 값 변경 시 처리
      const phoneInput = document.getElementById('phonenumber');
      phoneInput.addEventListener('input', (e) => setPhoneNumber(e.target.value));

      const pwdInput = document.getElementById('userpwd');
      pwdInput.addEventListener('input', (e) => setUserPwd(e.target.value));
    });
  </script>
</body>
</html>
